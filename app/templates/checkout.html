{% extends "base.html" %}

{% block content %}

<div class="max-w-5xl mx-auto py-16">

    <h1 class="text-4xl font-bold mb-8">

        Finalizar Compra

    </h1>

    <form method="POST">

        <input
            name="nombre"
            placeholder="Nombre completo"
            class="w-full border p-3 rounded mb-4"
            required>

        <input
            name="telefono"
            placeholder="Teléfono"
            class="w-full border p-3 rounded mb-4"
            required>

        <input
            name="email"
            type="email"
            placeholder="Correo electrónico (opcional)"
            class="w-full border p-3 rounded mb-6">

        <table class="w-full border">

            <tr class="bg-gray-100">

                <th class="p-3">Producto</th>
                <th>Cantidad</th>
                <th>Subtotal</th>

            </tr>

            {% for item in items %}

            <tr>

                <td class="p-3">
                    {{ item.producto.nombre }}
                </td>

                <td class="text-center">
                    {{ item.cantidad }}
                </td>

                <td class="text-center">
                    ${{ "%.2f"|format(item.subtotal) }}
                </td>

            </tr>

            {% endfor %}

        </table>

        <div class="text-right text-3xl font-bold mt-8">

            Total: ${{ "%.2f"|format(total) }}

        </div>

        <button
            class="mt-8 bg-emerald-600 text-white px-8 py-4 rounded-xl hover:bg-emerald-700">

            📄 Finalizar Compra y Descargar PDF

        </button>

    </form>

</div>

{% endblock %}
