{% extends "base.html" %}

{% block content %}

<div class="max-w-5xl mx-auto p-10">

    <h1 class="text-4xl font-bold mb-10">
        🧺 Tu Carrito
    </h1>

    {% for p in productos %}

    <div class="bg-white p-6 rounded-xl shadow mb-4">

        <h2 class="text-xl font-bold">{{ p.nombre }}</h2>
        <p>{{ p.descripcion }}</p>
        <p class="text-emerald-600 font-bold">${{ p.precio }}</p>

    </div>

    {% endfor %}

</div>

{% endblock %}
