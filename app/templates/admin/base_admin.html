<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>CleanPro Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    <!-- Sidebar -->

    <aside class="w-64 bg-gray-900 text-white p-6">

        <h1 class="text-3xl font-bold mb-10">

            🧹 CleanPro

        </h1>

        <nav class="space-y-4">

            <a href="/dashboard"
               class="block hover:text-emerald-400">

                📊 Dashboard

            </a>

            <a href="/admin"
               class="block hover:text-emerald-400">

                📦 Productos

            </a>

            <a href="/admin/orders"
               class="block hover:text-emerald-400">

                🧾 Pedidos

            </a>

            <a href="/cart"
               class="block hover:text-emerald-400">

                🛒 Carrito

            </a>

            <a href="/"
               class="block hover:text-emerald-400">

                🌐 Sitio Web

            </a>

            <a href="/logout"
               class="block text-red-400 hover:text-red-300">

                🚪 Cerrar sesión

            </a>

        </nav>

    </aside>

    <!-- Contenido -->

    <main class="flex-1 p-10">

        {% block content %}

        {% endblock %}

    </main>

</div>

</body>

</html>
