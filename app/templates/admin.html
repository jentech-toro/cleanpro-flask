<!DOCTYPE html>
<html>
<head>
    <title>Admin - CleanPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-10">

    <div class="flex justify-between items-center mb-10">

    <div>

        <h1 class="text-4xl font-bold">
            🧑‍💼 Panel Admin
        </h1>

        <p class="text-gray-500 mt-2">
            Gestiona productos, inventario y servicios.
        </p>

    </div>
    <div class="grid md:grid-cols-3 gap-6 mb-10">

    <div class="bg-white rounded-2xl shadow p-6">

        <p class="text-gray-500">Productos</p>

        <h2 class="text-4xl font-bold text-emerald-600 mt-2">

            {{ productos|length }}

        </h2>

    </div>

    <div class="bg-white rounded-2xl shadow p-6">

        <p class="text-gray-500">Estado</p>

        <h2 class="text-2xl font-bold text-green-600 mt-2">

            Sistema Activo

        </h2>

    </div>

    <div class="bg-white rounded-2xl shadow p-6">

        <p class="text-gray-500">Versión</p>

        <h2 class="text-2xl font-bold mt-2">

            v1.0

        </h2>

    </div>

</div>

    <a href="/dashboard"
       class="bg-emerald-600 text-white px-5 py-3 rounded-xl hover:bg-emerald-700 transition">

        📊 Dashboard

    </a>

</div>

<form method="GET" class="mb-6 flex gap-2">

   <form action="/admin/create" method="POST" enctype="multipart/form-data" class="grid gap-4">
    
    
    <input type="text" name="search"placeholder="Buscar producto..."
        value="{{ search or '' }}"
        class="border p-2 rounded w-full"
    >

    <button class="bg-emerald-600 text-white px-4 py-2 rounded">
        Buscar
    </button>

</form>

    <div class="bg-white p-6 rounded-xl shadow mb-10">

    <h2 class="text-2xl font-bold mb-4">
        ➕ Agregar Producto
    </h2>

    <form action="/admin/create" method="POST" class="grid gap-4">

        <input name="nombre" placeholder="Nombre"
               class="border p-2 rounded" required>

        <input name="descripcion" placeholder="Descripción"
               class="border p-2 rounded">

        <input name="precio" type="number" step="0.01"
               placeholder="Precio"
               class="border p-2 rounded" required>

        <input name="stock" type="number"
               placeholder="Stock"
               class="border p-2 rounded">

        <button class="bg-emerald-600 text-white p-3 rounded hover:bg-emerald-700">
            Guardar Producto
        </button>

    </form>

</div>

    <div class="grid md:grid-cols-3 gap-6">

    {% for p in productos %}

    <div class="bg-white p-6 rounded-2xl shadow hover:shadow-xl transition">

        <h2 class="text-xl font-bold">
            {{ p.nombre }}
        </h2>

        <p class="text-gray-600 mt-2">
            {{ p.descripcion }}
        </p>

        <div class="flex justify-between items-center mt-4">

            <span class="text-2xl font-bold text-emerald-600">
                ${{ p.precio }}
            </span>

            <span class="text-sm text-gray-500">
                Stock: {{ p.stock }}
            </span>

        </div>

        <div class="flex justify-end gap-2 mt-6">

            <a href="/admin/edit/{{ p.id }}"
               class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">
                ✏️
            </a>

            <a href="/admin/delete/{{ p.id }}"
               onclick="return confirm('¿Eliminar producto?')"
               class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">
                🗑️
            </a>

        </div>

    </div>

    {% endfor %}

</div>
