<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - CleanPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="min-h-screen flex">

    <!-- Menú lateral -->
    <aside class="w-64 bg-emerald-700 text-white p-6">

        <h1 class="text-3xl font-bold mb-10">
            🧹 CleanPro
        </h1>

        <nav class="space-y-4">

            <a href="/dashboard" class="block p-3 rounded hover:bg-emerald-800">
                📊 Dashboard
            </a>

            <a href="/admin" class="block p-3 rounded hover:bg-emerald-800">
                📦 Productos
            </a>

        </nav>

    </aside>

    <!-- Contenido -->

    <main class="flex-1 p-10">

        <h2 class="text-4xl font-bold mb-10">

            Bienvenido Nelson 👋

        </h2>

        <div class="grid md:grid-cols-3 gap-6">

            <div class="bg-white p-8 rounded-2xl shadow">

                <h3 class="text-gray-500">

                    Productos

                </h3>

                <p class="text-5xl font-bold text-emerald-600 mt-4">

                    {{ total_productos }}

                </p>

            </div>

        

            <div class="bg-white p-8 rounded-2xl shadow">

                <h3 class="text-gray-500">

                    Servicios

                </h3>

                <p class="text-5xl font-bold text-blue-600 mt-4">

                    3

                </p>

            </div>

            <div class="bg-white p-8 rounded-2xl shadow">

                <h3 class="text-gray-500">

                    Stock Total

                </h3>

                <p class="text-5xl font-bold text-orange-500 mt-4">

                    {{ stock_total }}

                </p>

            </div>
            <div class="bg-white p-8 rounded-2xl shadow">

    <h3 class="text-gray-500">
        Valor Inventario
    </h3>

    <p class="text-5xl font-bold text-purple-600 mt-4">

        ${{ "%.2f"|format(valor_inventario) }}

    </p>

</div>

            

        </div>

        

    </main>

</div>

</body>
</html>
